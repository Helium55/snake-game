<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 贪吃蛇 — Roguelike</title>
<style>
  :root {
    --bg:#0a0a0f; --surface:rgba(20,20,40,0.88); --text:#e0e0f0;
    --accent:#00ff88; --gold:#ffd740; --danger:#ff4060; --purple:#a78bfa;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);
    background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
    background-size:20px 20px;
    display:flex;justify-content:center;align-items:center;min-height:100vh;
    font-family:'Segoe UI','PingFang SC',system-ui,sans-serif;color:var(--text);
    overflow-y:auto;padding:10px;
    user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  }

  .game-wrapper{display:flex;flex-direction:column;align-items:center;gap:10px;max-width:440px;width:100%}

  /* ---- Screens ---- */
  .screen{display:none;flex-direction:column;align-items:center;width:100%}
  .screen.active{display:flex}

  /* ---- Main Menu ---- */
  .menu-title{
    font-size:42px;font-weight:900;letter-spacing:4px;
    background:linear-gradient(135deg,#00ff88,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
    margin-bottom:8px;
  }
  .menu-subtitle{font-size:13px;color:rgba(255,255,255,0.35);letter-spacing:4px;margin-bottom:28px}
  .menu-btn{
    width:100%;max-width:300px;padding:14px;margin:6px 0;
    font-size:16px;font-weight:700;letter-spacing:2px;
    border:1px solid rgba(255,255,255,0.12);border-radius:14px;
    cursor:pointer;transition:all 0.2s;text-align:center;
    background:var(--surface);color:var(--text);
  }
  .menu-btn:hover{background:rgba(0,255,136,0.08);border-color:var(--accent)}
  .menu-btn.primary{background:rgba(0,255,136,0.12);border-color:rgba(0,255,136,0.3);color:var(--accent)}
  .menu-btn.primary:hover{background:rgba(0,255,136,0.2);box-shadow:0 0 24px rgba(0,255,136,0.15)}

  .menu-stats{display:flex;gap:20px;margin:16px 0;font-size:13px;color:rgba(255,255,255,0.4)}
  .menu-stats span{color:var(--gold)}

  /* ---- Header ---- */
  .header{
    display:flex;justify-content:space-between;align-items:center;width:100%;
    padding:10px 16px;background:var(--surface);backdrop-filter:blur(12px);
    border-radius:16px;border:1px solid rgba(255,255,255,0.08);
  }
  .score-panel{display:flex;flex-direction:column}
  .score-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.4)}
  .score-value{font-size:26px;font-weight:700;color:var(--accent);text-shadow:0 0 20px rgba(0,255,136,0.5)}
  .high-score-panel{display:flex;flex-direction:column;align-items:flex-end}
  .high-score-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.4)}
  .high-score-value{font-size:18px;font-weight:600;color:var(--gold);text-shadow:0 0 12px rgba(255,215,64,0.3)}
  .stage-badge{
    font-size:11px;font-weight:700;color:var(--purple);
    padding:4px 10px;background:rgba(167,139,250,0.12);border-radius:20px;
    border:1px solid rgba(167,139,250,0.2);
  }
  .food-progress{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px}

  /* ---- Name row ---- */
  .name-row{display:flex;align-items:center;gap:8px;width:100%}
  .name-input{
    flex:1;padding:8px 14px;font-size:14px;
    background:var(--surface);backdrop-filter:blur(8px);
    border:1px solid rgba(255,255,255,0.1);border-radius:12px;
    color:var(--text);outline:none;
  }
  .name-input:focus{border-color:var(--accent)}
  .name-input::placeholder{color:rgba(255,255,255,0.2)}
  .btn-lb{
    padding:8px 16px;font-size:12px;font-weight:700;letter-spacing:1px;
    border:1px solid rgba(255,215,64,0.3);border-radius:12px;
    background:rgba(255,215,64,0.08);color:var(--gold);
    cursor:pointer;white-space:nowrap;transition:all 0.2s;
  }
  .btn-lb:hover{background:rgba(255,215,64,0.16);border-color:var(--gold)}
  .btn-back{
    padding:6px 14px;font-size:12px;font-weight:600;
    border:1px solid rgba(255,255,255,0.1);border-radius:10px;
    background:var(--surface);color:rgba(255,255,255,0.5);
    cursor:pointer;transition:all 0.2s;
  }
  .btn-back:hover{color:var(--text);border-color:rgba(255,255,255,0.25)}

  /* ---- Canvas ---- */
  .canvas-container{
    position:relative;border-radius:16px;overflow:hidden;
    border:2px solid rgba(255,255,255,0.1);
    box-shadow:0 0 40px rgba(0,255,136,0.08),0 0 80px rgba(0,0,0,0.5);
    transition:border-color 0.5s,box-shadow 0.5s;
  }
  .canvas-container.invincible{
    border-color:rgba(255,215,64,0.6);
    box-shadow:0 0 40px rgba(255,215,64,0.2),0 0 80px rgba(255,180,0,0.15);
    animation:inv-pulse 1.5s ease-in-out infinite;
  }
  .canvas-container.boss{
    border-color:rgba(255,64,96,0.5);
    box-shadow:0 0 40px rgba(255,64,96,0.15),0 0 80px rgba(0,0,0,0.5);
  }
  @keyframes inv-pulse{
    0%,100%{box-shadow:0 0 40px rgba(255,215,64,0.2),0 0 80px rgba(255,180,0,0.15)}
    50%{box-shadow:0 0 60px rgba(255,215,64,0.4),0 0 120px rgba(255,180,0,0.3)}
  }
  canvas{display:block;background:#080812}

  .inv-badge{
    display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);
    font-size:12px;font-weight:700;letter-spacing:2px;
    color:#ffd740;text-shadow:0 0 16px rgba(255,215,64,0.8);
    padding:4px 14px;background:rgba(0,0,0,0.6);border-radius:20px;
    border:1px solid rgba(255,215,64,0.4);
    animation:badge-glow 1s ease-in-out infinite;z-index:5;pointer-events:none;
  }
  .inv-badge.active{display:block}
  .boss-badge{
    display:none;position:absolute;top:10px;right:10px;
    font-size:12px;font-weight:700;color:#ff4060;
    text-shadow:0 0 12px rgba(255,64,96,0.6);
    z-index:5;pointer-events:none;
  }
  .boss-badge.active{display:block}

  @keyframes badge-glow{
    0%,100%{box-shadow:0 0 10px rgba(255,215,64,0.3)}
    50%{box-shadow:0 0 20px rgba(255,215,64,0.6)}
  }

  /* ---- Overlays ---- */
  .overlay{
    display:none;position:absolute;inset:0;
    background:rgba(8,8,18,0.85);backdrop-filter:blur(4px);
    justify-content:center;align-items:center;flex-direction:column;gap:12px;z-index:10;
  }
  .overlay.active{display:flex}
  .overlay-title{font-size:30px;font-weight:800;letter-spacing:4px}
  .overlay-title.pause{color:#ccccee}
  .overlay-title.over{color:var(--danger);text-shadow:0 0 30px rgba(255,64,96,0.5)}
  .overlay-subtitle{font-size:14px;color:rgba(255,255,255,0.5)}
  .overlay-score{font-size:44px;font-weight:800;color:var(--accent);text-shadow:0 0 30px rgba(0,255,136,0.5)}
  .new-record{font-size:14px;font-weight:700;color:var(--gold);text-shadow:0 0 16px rgba(255,215,64,0.6);animation:badge-glow 1s ease-in-out infinite}

  .btn{
    padding:10px 28px;font-size:14px;font-weight:700;letter-spacing:1px;
    border:none;border-radius:30px;cursor:pointer;transition:all 0.2s;
    text-transform:uppercase;color:#0a0a0f;
  }
  .btn-restart{background:var(--accent);box-shadow:0 0 20px rgba(0,255,136,0.3)}
  .btn-restart:hover{box-shadow:0 0 30px rgba(0,255,136,0.5);transform:scale(1.04)}
  .btn-menu{background:var(--purple);box-shadow:0 0 16px rgba(167,139,250,0.2)}
  .btn-menu:hover{box-shadow:0 0 24px rgba(167,139,250,0.4);transform:scale(1.04)}
  .btn-resume{background:#ccccee;box-shadow:0 0 16px rgba(200,200,240,0.2)}
  .btn-resume:hover{box-shadow:0 0 24px rgba(200,200,240,0.4);transform:scale(1.04)}

  .submit-status{font-size:12px;color:rgba(255,255,255,0.4);min-height:18px;text-align:center}
  .submit-status.success{color:var(--accent)}
  .submit-status.error{color:var(--danger)}

  .meta-coin-row{font-size:18px;font-weight:700;color:var(--gold);text-shadow:0 0 12px rgba(255,215,64,0.3)}
  .meta-coin-row span{font-size:12px;color:rgba(255,255,255,0.4)}

  /* ---- Stage Transition / Card Pick ---- */
  .card-overlay{
    position:absolute;inset:0;background:rgba(8,8,18,0.9);backdrop-filter:blur(6px);
    display:none;justify-content:center;align-items:center;flex-direction:column;gap:16px;z-index:15;
  }
  .card-overlay.active{display:flex}
  .card-title{font-size:22px;font-weight:800;color:var(--purple);text-shadow:0 0 20px rgba(167,139,250,0.4)}
  .card-subtitle{font-size:12px;color:rgba(255,255,255,0.4)}
  .cards-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;padding:0 8px}
  .card{
    width:110px;padding:14px 10px;border-radius:14px;
    background:rgba(20,20,50,0.95);border:1px solid rgba(255,255,255,0.1);
    cursor:pointer;transition:all 0.2s;text-align:center;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .card:hover{border-color:var(--purple);box-shadow:0 0 20px rgba(167,139,250,0.2);transform:translateY(-3px)}
  .card-icon{font-size:28px}
  .card-name{font-size:13px;font-weight:700;color:var(--text)}
  .card-desc{font-size:10px;color:rgba(255,255,255,0.45);line-height:1.4}
  .card-cat{font-size:9px;padding:2px 8px;border-radius:10px;letter-spacing:1px;text-transform:uppercase}
  .cat-growth{background:rgba(0,255,136,0.12);color:#00ff88}
  .cat-agility{background:rgba(100,180,255,0.12);color:#64b4ff}
  .cat-score{background:rgba(255,215,64,0.12);color:#ffd740}
  .cat-survival{background:rgba(255,64,96,0.12);color:#ff6090}
  .cat-special{background:rgba(167,139,250,0.12);color:#a78bfa}

  /* ---- Achievement Toast ---- */
  .toast-container{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none;width:90%;max-width:380px}
  .achievement-toast{
    background:rgba(20,18,40,0.95);backdrop-filter:blur(12px);
    border:1px solid rgba(255,215,64,0.4);border-radius:14px;
    padding:12px 16px;box-shadow:0 0 24px rgba(255,215,64,0.15);
    animation:toast-in 0.4s ease-out,toast-out 0.4s 2.6s ease-in forwards;
    display:flex;align-items:center;gap:10px;
  }
  @keyframes toast-in{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateY(-20px)}}
  .toast-icon{font-size:28px}
  .toast-info{flex:1}
  .toast-name{font-size:14px;font-weight:700;color:var(--gold)}
  .toast-desc{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px}

  /* ---- LB Modal ---- */
  .lb-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:100;justify-content:center;align-items:center;padding:16px}
  .lb-modal.active{display:flex}
  .lb-panel{width:100%;max-width:420px;max-height:80vh;background:#111122;border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:24px 20px 16px;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,0.6)}
  .lb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0}
  .lb-title{font-size:20px;font-weight:800;letter-spacing:2px;color:var(--gold);text-shadow:0 0 16px rgba(255,215,64,0.3)}
  .lb-close{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .lb-close:hover{background:rgba(255,255,255,0.12)}
  .lb-table-wrap{flex:1;overflow-y:auto;border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
  .lb-table{width:100%;border-collapse:collapse;font-size:13px}
  .lb-table thead{position:sticky;top:0;z-index:2}
  .lb-table th{background:#1a1a30;padding:10px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);border-bottom:1px solid rgba(255,255,255,0.08)}
  .lb-table td{padding:9px 6px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:center}
  .lb-table tbody tr:hover{background:rgba(255,255,255,0.03)}
  .lb-table tbody tr.me{background:rgba(0,255,136,0.06)}
  .lb-rank{font-weight:700;color:rgba(255,255,255,0.5)}
  .lb-rank.top1{color:#ffd740;text-shadow:0 0 10px rgba(255,215,64,0.5)}
  .lb-rank.top2{color:#c0c0c0}
  .lb-rank.top3{color:#cd7f32}
  .lb-name{text-align:left;color:var(--text);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lb-score{font-weight:600;color:var(--accent)}
  .lb-level{font-size:11px;color:rgba(255,255,255,0.4)}
  .lb-stage{font-size:11px;color:rgba(167,139,250,0.5)}
  .lb-time{font-size:10px;color:rgba(255,255,255,0.2)}
  .lb-loading{text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:14px}
  .lb-refresh{margin-top:12px;padding:8px;font-size:13px;text-align:center;color:rgba(255,255,255,0.4);cursor:pointer;border-radius:8px;flex-shrink:0}
  .lb-refresh:hover{color:var(--text)}

  /* ---- Shop Screen ---- */
  .shop-coins{font-size:22px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:6px;margin-bottom:16px}
  .shop-grid{width:100%;display:flex;flex-direction:column;gap:8px}
  .shop-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 14px;background:var(--surface);border:1px solid rgba(255,255,255,0.06);
    border-radius:12px;gap:10px;
  }
  .shop-item.owned{border-color:rgba(0,255,136,0.2);background:rgba(0,255,136,0.04)}
  .shop-info{flex:1;min-width:0}
  .shop-item-name{font-size:14px;font-weight:600}
  .shop-item-desc{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}
  .shop-item-cost{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap}
  .shop-btn{
    padding:6px 16px;font-size:12px;font-weight:700;
    border-radius:10px;cursor:pointer;transition:all 0.2s;
    white-space:nowrap;
    background:rgba(255,215,64,0.1);border:1px solid rgba(255,215,64,0.3);color:var(--gold);
  }
  .shop-btn:hover{background:rgba(255,215,64,0.2)}
  .shop-btn.owned{background:rgba(0,255,136,0.1);border-color:rgba(0,255,136,0.3);color:var(--accent);cursor:default}
  .shop-btn.unaffordable{opacity:0.3;cursor:not-allowed}

  /* ---- Achievements Screen ---- */
  .ach-grid{width:100%;display:flex;flex-direction:column;gap:6px;max-height:55vh;overflow-y:auto}
  .ach-item{
    display:flex;align-items:center;gap:12px;
    padding:10px 14px;border-radius:12px;
    background:var(--surface);border:1px solid rgba(255,255,255,0.04);
  }
  .ach-item.locked{opacity:0.35;filter:grayscale(0.8)}
  .ach-icon{font-size:24px;flex-shrink:0}
  .ach-info{flex:1}
  .ach-name{font-size:13px;font-weight:600}
  .ach-desc{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
  .ach-check{color:var(--accent);font-size:16px;flex-shrink:0}

  /* ---- Mobile ---- */
  .mobile-controls{display:none;width:100%;max-width:280px}
  @media(max-width:600px),(hover:none)and(pointer:coarse){.mobile-controls{display:block}}
  .dpad{display:grid;grid-template-areas:". up ." "left . right" ". down .";grid-template-columns:1fr 1fr 1fr;gap:6px}
  .dpad-btn{
    aspect-ratio:1;border:1px solid rgba(255,255,255,0.12);border-radius:14px;
    background:var(--surface);backdrop-filter:blur(8px);color:var(--text);
    font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all 0.1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
  }
  .dpad-btn:active{background:rgba(0,255,136,0.15);border-color:var(--accent);box-shadow:0 0 16px rgba(0,255,136,0.2)}
  .dpad-up{grid-area:up}.dpad-left{grid-area:left}.dpad-right{grid-area:right}.dpad-down{grid-area:down}
  .pause-btn-mobile{width:100%;margin-top:10px;padding:10px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:var(--surface);color:var(--text);font-size:14px;font-weight:600;letter-spacing:2px;cursor:pointer;text-align:center}
  .key-hint{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:1px;text-align:center}
  @media(max-width:600px){.key-hint{display:none}.canvas-container{border-radius:12px}canvas{width:100%;height:auto}}
</style>
</head>
<body>

<!-- Achievement Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<!-- ========== MAIN MENU ========== -->
<div class="screen active" id="menuScreen">
  <div class="game-wrapper">
    <h1 class="menu-title">🐍 贪吃蛇</h1>
    <div class="menu-subtitle">R O G U E L I K E</div>
    <div class="menu-stats">
      <span>💰 <b id="menuMetaCoins">0</b></span>
      <span>🏆 <b id="menuBestScore">0</b></span>
      <span>🎖 <b id="menuAchCount">0/14</b></span>
    </div>
    <button class="menu-btn primary" id="btnPlay">▶ 开始游戏</button>
    <button class="menu-btn" id="btnShop">🛒 永久升级</button>
    <button class="menu-btn" id="btnAchievements">🏆 成就</button>
    <button class="menu-btn" id="btnLBFromMenu">📊 排行榜</button>
    <div class="name-row" style="margin-top:8px">
      <input class="name-input" id="playerName" placeholder="输入昵称" maxlength="12" autocomplete="off">
    </div>
  </div>
</div>

<!-- ========== GAME SCREEN ========== -->
<div class="screen" id="gameScreen">
  <div class="game-wrapper">
    <div class="header">
      <div class="score-panel">
        <span class="score-label">得分</span>
        <span class="score-value" id="score">0</span>
      </div>
      <div style="text-align:center">
        <div class="stage-badge" id="stageBadge">第 1 关</div>
        <div class="food-progress" id="foodProgress">0/5 🍎</div>
      </div>
      <div class="high-score-panel">
        <span class="high-score-label">最高分</span>
        <span class="high-score-value" id="highScore">0</span>
      </div>
    </div>

    <div class="canvas-container" id="canvasContainer">
      <canvas id="gameCanvas" width="400" height="400"></canvas>
      <div class="inv-badge" id="invBadge">⭐ 无敌模式</div>
      <div class="boss-badge" id="bossBadge">💀 BOSS</div>

      <div class="overlay" id="pauseOverlay">
        <div class="overlay-title pause">暂 停</div>
        <div class="overlay-subtitle">按 空格键 继续</div>
        <button class="btn btn-resume" id="btnResume">继续</button>
      </div>

      <div class="overlay" id="gameOverOverlay">
        <div class="overlay-title over">游戏结束</div>
        <div class="overlay-score" id="finalScore">0</div>
        <div class="new-record" id="newRecord" style="display:none">🎉 新纪录！</div>
        <div class="overlay-subtitle" id="finalHighScore"></div>
        <div class="meta-coin-row" id="metaCoinEarned"></div>
        <div class="submit-status" id="submitStatus"></div>
        <button class="btn btn-restart" id="btnRestart">再来一局</button>
        <button class="btn btn-menu" id="btnToMenu">返回主菜单</button>
      </div>

      <!-- Stage Transition Card Pick -->
      <div class="card-overlay" id="cardOverlay">
        <div class="card-title" id="cardTitle">🎴 选择升级</div>
        <div class="card-subtitle" id="cardSubtitle">选择一张永久生效于本局</div>
        <div class="cards-row" id="cardsRow"></div>
      </div>
    </div>

    <div class="mobile-controls">
      <div class="dpad">
        <button class="dpad-btn dpad-up" id="dpadUp">▲</button>
        <button class="dpad-btn dpad-left" id="dpadLeft">◀</button>
        <button class="dpad-btn dpad-right" id="dpadRight">▶</button>
        <button class="dpad-btn dpad-down" id="dpadDown">▼</button>

let snake,food,specialFood,obstacles,direction,nextDirection;
let score,highScore,stage,foodEaten,stageGoal,gameOver,paused,invincible,isBoss;

function loadHighScore(){try{return parseInt(localStorage.getItem('snake_highscore')||'0')}catch(e){return 0}}

function randomCell(){
  return {x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)};
}

function getSpeed(){
  const mult=activeCards.some(c=>c.id==='speed_up')?0.8:1;
  return Math.max(MIN_SPEED,BASE_SPEED*mult-(stage-1)*SPEED_DEC);
}

function foodNeededForStage(s){return 4+s}

function initGame(){
  const mid=Math.floor(GRID/2);
  snake=[{x:mid,y:mid},{x:mid-1,y:mid},{x:mid-2,y:mid}];
  const lenBonus=getPurchasedUpgrades()['len1']?1:0+(getPurchasedUpgrades()['len2']?2:0);
  for(let i=0;i<lenBonus;i++)snake.push({...snake[snake.length-1]});
  direction='right';nextDirection='right';
  score=0;stage=1;foodEaten=0;stageGoal=foodNeededForStage(1);
  gameOver=false;paused=false;invincible=false;isBoss=false;
  inputLocked=false;scoreSubmitted=false;activeCards=[];
  shieldCount=(getPurchasedUpgrades()['shield1']?1:0);
  shieldsUsedThisRun=0;usedInvincibleThisRun=false;
  specialFood=null;obstacles=[];konamiIdx=0;noLock=false;
  phaseTimer=0;

  highScore=loadHighScore();
  metaCoins=loadMetaCoins();

  spawnFood();
  updateUI();
  hideOverlays();

  const cc=$('canvasContainer');
  cc.classList.remove('invincible','boss');
  $('invBadge').classList.remove('active');
  $('bossBadge').classList.remove('active');

  if(tickTimer)clearTimeout(tickTimer);
  if(specialFoodTimer)clearInterval(specialFoodTimer);
  tickTimer=setTimeout(gameTick,getSpeed());
  scheduleSpecialFood();
}

function scheduleSpecialFood(){
  if(specialFoodTimer)clearInterval(specialFoodTimer);
  const baseChance=0.15;
  const cardBonus=activeCards.some(c=>c.id==='special_up')?0.15:0;
  const mirrorBonus=activeCards.some(c=>c.id==='card_mirror')?activeCards.some(c=>c.id==='special_up')?0.3:0.15:0;
  const chance=baseChance+cardBonus+mirrorBonus;
  specialFoodTimer=setInterval(()=>{if(!gameOver&&!paused&&!specialFood&&Math.random()<chance)spawnSpecialFood()},3500+Math.random()*4000);
}

function isOccupied(cell,skipSnakeTail){
  if(snake.some((s,i)=>s.x===cell.x&&s.y===cell.y&&!(skipSnakeTail&&i===snake.length-1)))return true;
  if(food&&food.x===cell.x&&food.y===cell.y)return true;
  if(specialFood&&specialFood.x===cell.x&&specialFood.y===cell.y)return true;
  if(obstacles.some(o=>o.x===cell.x&&o.y===cell.y))return true;
  return false;
}

function spawnFood(){
  let c;do{c=randomCell()}while(isOccupied(c,false));food=c;
}
function spawnSpecialFood(){
  let c,t=0;do{c=randomCell();t++}while(isOccupied(c,false)&&t<200);
  if(t<200){specialFood=c;specialFood.spawnTime=Date.now()}
}

function spawnObstacles(){
  obstacles=[];
  const count=2+Math.floor(stage/5);
  for(let i=0;i<count;i++){
    let c,t=0;do{c=randomCell();t++}while(isOccupied(c,false)&&t<200);
    if(t<200)obstacles.push(c);
  }
}

// ============================================================
//  GAME LOOP
// ============================================================
function gameTick(){
  if(paused||gameOver)return;
  inputLocked=false;

  if(isValidDirection(nextDirection))direction=nextDirection;

  const head={...snake[0]};
  switch(direction){
    case'up':head.y--;break;case'down':head.y++;break;
    case'left':head.x--;break;case'right':head.x++;break;
  }

  // Wall collision
  const hitWall=head.x<0||head.x>=GRID||head.y<0||head.y>=GRID;
  // Obstacle collision
  const hitObstacle=obstacles.some(o=>o.x===head.x&&o.y===head.y);

  // Phase ability: temporary invincibility
  let isPhasing=false;
  if(activeCards.some(c=>c.id==='phase')){
    phaseTimer+=getSpeed();
    if(phaseTimer>=8000){phaseTimer=0;isPhasing=true}
    if(isPhasing&&(hitWall||hitObstacle)){head.x=(head.x+GRID)%GRID;head.y=(head.y+GRID)%GRID}
  }else{phaseTimer=0}

  if(hitWall||hitObstacle){
    if(invincible||isPhasing){
      if(hitWall){head.x=(head.x+GRID)%GRID;head.y=(head.y+GRID)%GRID}
    }else if(shieldCount>0){
      shieldCount--;shieldsUsedThisRun++;
      if(hitWall){head.x=(head.x+GRID)%GRID;head.y=(head.y+GRID)%GRID}
      // dodge: 10% chance to avoid obstacle
    }else if(activeCards.some(c=>c.id==='dodge')&&Math.random()<0.1){
      // Dodged! No damage
      if(hitWall){head.x=(head.x+GRID)%GRID;head.y=(head.y+GRID)%GRID}
    }else{
      endGame();return;
    }
  }

  const willEatRegular=food&&head.x===food.x&&head.y===food.y;
  const willEatSpecial=specialFood&&head.x===specialFood.x&&head.y===specialFood.y;
  const growing=willEatRegular||willEatSpecial;

  // Self collision
  const checkLen=growing?snake.length:snake.length-1;
  let hitSelf=false;
  for(let i=0;i<checkLen;i++){if(snake[i].x===head.x&&snake[i].y===head.y){hitSelf=true;break}}
  if(hitSelf){
    if(invincible||isPhasing){}else if(shieldCount>0){shieldCount--;shieldsUsedThisRun++}else if(activeCards.some(c=>c.id==='dodge')&&Math.random()<0.1){}else{endGame();return}
  }

  snake.unshift(head);

  let pointsEarned=0,metaEarned=0;
  if(willEatRegular){
    const base=invincible?0.5:1;
    const mult=activeCards.some(c=>c.id==='score_mult')?1.5:1;
    const bonus=activeCards.some(c=>c.id==='food_plus')?1:0+(activeCards.some(c=>c.id==='card_greed')?2:0);
    pointsEarned=Math.floor((base+bonus)*mult);
    score+=pointsEarned;
    if(activeCards.some(c=>c.id==='coin_drop'))metaEarned+=1;
    foodEaten++;sfxEat();
    spawnFood();
    if(specialFood&&food.x===specialFood.x&&food.y===specialFood.y)specialFood=null;
  }else if(willEatSpecial){
    const base=invincible?1:2;
    const mult=activeCards.some(c=>c.id==='score_mult')?1.5:1;
    const dbl=activeCards.some(c=>c.id==='double_special')?2:1;
    const bossMult=isBoss&&activeCards.some(c=>c.id==='boss_bonus')?2:1;
    pointsEarned=Math.floor(base*mult*dbl*bossMult);
    score+=pointsEarned;
    foodEaten++;sfxSpecial();

    // Grow extra: double special means more growth too
    const growBy=activeCards.some(c=>c.id==='grow_extra')?2:1;
    for(let i=0;i<growBy*dbl-1;i++)snake.push({...snake[snake.length-1]});
    specialFood=null;
  }else{
    snake.pop();
  }

  metaCoins+=metaEarned;

  // Expire special food
  if(specialFood&&Date.now()-specialFood.spawnTime>8000)specialFood=null;

  // Magnet: pull nearby food toward snake head
  if(activeCards.some(c=>c.id==='magnet')){
    const h=snake[0];
    const pullDist=3;
    if(food&&Math.abs(food.x-h.x)+Math.abs(food.y-h.y)<=pullDist){
      if(food.x<h.x)food.x++;else if(food.x>h.x)food.x--;
      else if(food.y<h.y)food.y++;else if(food.y>h.y)food.y--;
    }
    if(specialFood&&Math.abs(specialFood.x-h.x)+Math.abs(specialFood.y-h.y)<=pullDist){
      if(specialFood.x<h.x)specialFood.x++;else if(specialFood.x>h.x)specialFood.x--;
      else if(specialFood.y<h.y)specialFood.y++;else if(specialFood.y>h.y)specialFood.y--;
    }
  }

  // Check stage clear
  if(foodEaten>=stageGoal){
    clearStage();
    return;
  }

  updateUI();
  draw();
  if(!gameOver)tickTimer=setTimeout(gameTick,getSpeed());
}

function clearStage(){
  sfxCard();
  // If grow_start wasn't already applied, apply it now
  // Stage transition
  if(tickTimer)clearTimeout(tickTimer);
  if(specialFoodTimer)clearInterval(specialFoodTimer);

  stage++;
  foodEaten=0;
  stageGoal=foodNeededForStage(stage);
  isBoss=stage%5===0;
  if(isBoss){
    spawnObstacles();
    // Trigger boss hint achievement on first encounter
    if(!achStats.firstBossEncountered){
      achStats.firstBossEncountered=true;
      checkAchievements(achStats);
    }
  }else obstacles=[];

  // Regen card
  if(activeCards.some(c=>c.id==='card_regen')){
    for(let i=0;i<2;i++)snake.push({...snake[snake.length-1]});
  }

  draw();
  updateUI();

  const cc=$('canvasContainer');
  if(isBoss)cc.classList.add('boss');else cc.classList.remove('boss');
  $('bossBadge').classList.toggle('active',isBoss);

  // Show card pick
  showCardPick();
}

function showCardPick(){
  const available=getAvailableCards();
  // Filter out already-picked cards and cards that don't stack
  const pickedIds=activeCards.map(c=>c.id);
  const candidates=available.filter(c=>!pickedIds.includes(c.id));

  // Shuffle and pick 3
  const shuffled=candidates.sort(()=>Math.random()-0.5);
  const choices=shuffled.slice(0,Math.min(3,shuffled.length));

  $('cardTitle').textContent=isBoss?'🎴 Boss 击败！选择奖励':'🎴 第 '+(stage-1)+' 关通过！';
  $('cardSubtitle').textContent=isBoss?'Boss关奖励更丰厚':'选择一张升级卡牌';

  const row=$('cardsRow');
  row.innerHTML=choices.map(c=>`
    <div class="card" data-id="${c.id}">
      <div class="card-icon">${c.icon}</div>
      <div class="card-name">${c.name}</div>
      <div class="card-desc">${c.desc}</div>
      <div class="card-cat cat-${c.cat}">${c.cat}</div>
    </div>
  `).join('');

  row.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.id;
      const card=getAvailableCards().find(c=>c.id===id);
      if(card){
        activeCards.push(card);
        if(card.id==='no_lock')noLock=true;
        if(card.id==='shield')shieldCount++;
        if(card.id==='grow_start'){for(let i=0;i<2;i++)snake.push({...snake[snake.length-1]})}
      }
      $('cardOverlay').classList.remove('active');
      // Resume game
      tickTimer=setTimeout(gameTick,getSpeed());
      scheduleSpecialFood();
      updateUI();
      draw();
    });
  });

  $('cardOverlay').classList.add('active');
}

// ============================================================
//  GAME END
// ============================================================
async function endGame(){
  gameOver=true;sfxDie();
  if(tickTimer)clearTimeout(tickTimer);
  if(specialFoodTimer)clearInterval(specialFoodTimer);

  const finalScore=Math.floor(score);
  const isNewRecord=finalScore>highScore;
  if(isNewRecord){highScore=finalScore;saveHighScore(highScore)}

  // Meta coins: 10% of final score
  const earnedMeta=Math.floor(finalScore*0.1);
  metaCoins+=earnedMeta;
  saveMetaCoins(metaCoins);

  // Achievement stats
  achStats.totalFoodEaten+=foodEaten+(stage-1)*stageGoal;
  achStats.maxStage=Math.max(achStats.maxStage,stage);
  achStats.shieldsUsed+=shieldsUsedThisRun;
  if(usedInvincibleThisRun)achStats.usedInvincible=true;
  achStats.maxLevel=Math.max(achStats.maxLevel,Math.floor(finalScore/5)+1);

  // Check achievements
  checkAchievements(achStats);

  $('finalScore').textContent=finalScore;
  $('finalHighScore').textContent=`最高分: ${highScore}`;
  $('newRecord').style.display=isNewRecord?'block':'none';
  $('metaCoinEarned').innerHTML=`💰 +${earnedMeta} <span>meta 金币</span>`;

  $('gameOverOverlay').classList.add('active');
  updateUI();draw();

  // Submit score
  if(finalScore>0&&!scoreSubmitted){
    scoreSubmitted=true;
    $('submitStatus').textContent='提交分数中...';$('submitStatus').className='submit-status';
    const name=$('playerName').value.trim()||'无名蛇';
    const ok=await submitScore(name,finalScore,Math.floor(finalScore/5)+1,stage);
    if(ok){$('submitStatus').textContent='✅ 分数已上传至排行榜';$('submitStatus').className='submit-status success'}
    else{$('submitStatus').textContent='⚠️ 排行榜上传失败';$('submitStatus').className='submit-status error'}
  }

  updateMenuStats();
}

// ============================================================
//  UI
// ============================================================
function updateUI(){
  $('score').textContent=score;
  $('highScore').textContent=highScore;
  $('stageBadge').textContent=`第 ${stage} 关`;
  $('foodProgress').textContent=`${foodEaten}/${stageGoal} 🍎`;
}

function hideOverlays(){
  $('pauseOverlay').classList.remove('active');
  $('gameOverOverlay').classList.remove('active');
  $('cardOverlay').classList.remove('active');
  $('submitStatus').textContent='';$('submitStatus').className='submit-status';
}

function togglePause(){
  if(gameOver)return;
  paused=!paused;
  if(paused){$('pauseOverlay').classList.add('active')}
  else{$('pauseOverlay').classList.remove('active');tickTimer=setTimeout(gameTick,getSpeed())}
}

function toggleInvincible(){
  invincible=!invincible;usedInvincibleThisRun=true;
  const cc=$('canvasContainer'),badge=$('invBadge');
  if(invincible){cc.classList.add('invincible');badge.classList.add('active');sfxInvincible()}
  else{cc.classList.remove('invincible');badge.classList.remove('active')}
}

function isValidDirection(dir){
  const opp={up:'down',down:'up',left:'right',right:'left'};
  return dir!==opp[direction];
}

function changeDirection(dir){
  if(inputLocked&&!noLock)return;
  if(!isValidDirection(dir))return;
  nextDirection=dir;
  if(!noLock)inputLocked=true;
}

// ============================================================
//  RENDER
// ============================================================
function draw(){
  const canvas=$('gameCanvas'),ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,CW,CH);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=0.5;
  for(let i=0;i<=GRID;i++){const p=i*CELL;ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,CH);ctx.stroke();ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(CW,p);ctx.stroke()}

  // Obstacles
  for(const o of obstacles)drawCell(o.x,o.y,'#ff4060','rgba(255,64,96,0.6)',0.85,true);

  // Food
  if(food)drawCell(food.x,food.y,'#ff4060','rgba(255,64,96,0.7)',0.9,false);
  if(specialFood){
    const age=Date.now()-specialFood.spawnTime,pulse=0.7+0.3*Math.sin(age*0.01),alpha=age>6000?Math.max(0,1-(age-6000)/2000):1;
    drawCell(specialFood.x,specialFood.y,'#ffd740',`rgba(255,215,64,${pulse*alpha})`,pulse,false);
  }

  // Snake
  const len=snake.length;
  for(let i=len-1;i>=0;i--){
    const seg=snake[i],t=len===1?0:i/(len-1);
    let color,glow;
    if(invincible){const hue=42+Math.sin(Date.now()*0.005+i*0.4)*10;color=`hsl(${hue},90%,${60-t*20}%)`;glow=`hsla(${hue},90%,55%,0.6)`}
    else if(equippedSkin==='skin_fire'){const r=255,g=Math.round(100-t*80),b=Math.round(30-t*30);color=`rgb(${r},${g},${b})`;glow=`rgba(${r},${g},${b},0.55)`}
    else if(equippedSkin==='skin_ice'){const r=Math.round(80+t*40),g=Math.round(180+t*40),b=Math.round(255-t*20);color=`rgb(${r},${g},${b})`;glow=`rgba(${r},${g},${b},0.55)`}
    else if(equippedSkin==='skin_galaxy'){const r=Math.round(80+t*100),g=Math.round(60+t*60),b=Math.round(180-t*20);color=`rgb(${r},${g},${b})`;glow=`rgba(${r},${g},${b},0.55)`}
    else{const r=Math.round(0+t*138),g=Math.round(255-t*175),b=Math.round(136+t*119);color=`rgb(${r},${g},${b})`;glow=`rgba(${r},${g},${b},0.55)`}
    drawCell(seg.x,seg.y,color,glow,0.92,false);
  }

  // Eyes
  if(snake.length>0){
    const head=snake[0],hx=head.x*CELL,hy=head.y*CELL,er=2.5;ctx.fillStyle='#fff';
    let e1,e2;
    switch(direction){case'right':e1=[hx+13,hy+5];e2=[hx+13,hy+13];break;case'left':e1=[hx+5,hy+5];e2=[hx+5,hy+13];break;case'up':e1=[hx+5,hy+5];e2=[hx+13,hy+5];break;case'down':e1=[hx+5,hy+13];e2=[hx+13,hy+13];break}
    ctx.beginPath();ctx.arc(e1[0],e1[1],er,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e2[0],e2[1],er,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(e1[0],e1[1],1.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(e2[0],e2[1],1.3,0,Math.PI*2);ctx.fill();
  }
}

function drawCell(gx,gy,fillColor,glowColor,fillAlpha,isObstacle){
  const x=gx*CELL,y=gy*CELL,pad=1.2;
  const canvas=$('gameCanvas'),ctx=canvas.getContext('2d');
  ctx.shadowColor=glowColor;ctx.shadowBlur=8;
  const r=isObstacle?1:3,rx=x+pad,ry=y+pad,rw=CELL-pad*2,rh=CELL-pad*2;
  ctx.fillStyle=fillColor;ctx.globalAlpha=fillAlpha;
  ctx.beginPath();ctx.moveTo(rx+r,ry);ctx.lineTo(rx+rw-r,ry);ctx.quadraticCurveTo(rx+rw,ry,rx+rw,ry+r);ctx.lineTo(rx+rw,ry+rh-r);ctx.quadraticCurveTo(rx+rw,ry+rh,rx+rw-r,ry+rh);ctx.lineTo(rx+r,ry+rh);ctx.quadraticCurveTo(rx,ry+rh,rx,ry+rh-r);ctx.lineTo(rx,ry+r);ctx.quadraticCurveTo(rx,ry,rx+r,ry);ctx.closePath();ctx.fill();
  if(isObstacle){ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(rx+rw*0.2,ry+rh*0.2,rw*0.6,rh*0.6)}
  else{ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.arc(rx+rw*0.3,ry+rh*0.35,rw*0.22,0,Math.PI*2);ctx.fill()}
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.globalAlpha=1;
}

// ============================================================
//  SUPABASE HELPERS
// ============================================================
async function submitScore(name,score,level,stage){
  try{
    const row={player_name:name,score,level};
    const{error}=await supabase.from('leaderboard').insert(row);if(error)throw error;return true
  }catch(e){console.warn(e);return false}
}
async function fetchLeaderboard(){
  try{const{data,error}=await supabase.from('leaderboard').select('*').order('score',{ascending:false}).limit(50);if(error)throw error;return data||[]}catch(e){console.warn(e);return[]}
}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

async function openLeaderboard(){
  $('lbModal').classList.add('active');
  $('lbLoading').style.display='block';$('lbLoading').textContent='加载中...';
  $('lbTable').style.display='none';
  const data=await fetchLeaderboard();
  renderLeaderboard(data);
}
function closeLeaderboard(){$('lbModal').classList.remove('active')}
function renderLeaderboard(entries){
  $('lbLoading').style.display='none';
  if(!entries.length){$('lbTable').style.display='none';$('lbLoading').style.display='block';$('lbLoading').textContent='暂无数据，快来抢第一！';return}
  $('lbTable').style.display='';
  const curName=$('playerName').value.trim()||'无名蛇';
  $('lbBody').innerHTML=entries.map((e,i)=>{
    const r=i+1;let rc='';if(r===1)rc='top1';else if(r===2)rc='top2';else if(r===3)rc='top3';
    const isMe=e.player_name===curName&&e.score>=Math.floor(score)-2;
    const time=new Date(e.created_at).toLocaleDateString('zh-CN',{month:'short',day:'numeric'});
    return`<tr class="${isMe?'me':''}"><td class="lb-rank ${rc}">${r}</td><td class="lb-name" title="${escapeHtml(e.player_name)}">${escapeHtml(e.player_name)}</td><td class="lb-score">${e.score}</td><td class="lb-stage">${e.stage||1}</td><td class="lb-level">Lv.${e.level||1}</td><td class="lb-time">${time}</td></tr>`;
  }).join('');

  // Check rank1 achievement
  if(entries.length>0&&entries[0].player_name===curName&&entries[0].score>=Math.floor(score)-2){
    achStats.reachedRank1=true;
    checkAchievements(achStats);
  }
}

// ============================================================
//  SHOP
// ============================================================
function renderShop(){
  const coins=loadMetaCoins();
  const purchases=loadPurchases();
  $('shopCoinBalance').textContent=coins;
  $('shopGrid').innerHTML=SHOP_ITEMS.map(it=>{
    const owned=purchases.includes(it.id);
    const canAfford=coins>=it.cost;
    const locked=it.req&&!purchases.includes(it.req);
    let btnClass='shop-btn',btnText='购买',disabled='';
    if(owned){btnClass+=' owned';btnText='✓ 已拥有'}
    else if(locked){btnClass+=' unaffordable';btnText='🔒 需前置'}
    else if(!canAfford){btnClass+=' unaffordable';btnText='💰 '+it.cost}
    else btnText='💰 '+it.cost;
    return`<div class="shop-item ${owned?'owned':''}"><div class="shop-info"><div class="shop-item-name">${it.name}</div><div class="shop-item-desc">${it.desc}</div></div><button class="${btnClass}" data-id="${it.id}" ${owned||locked||!canAfford?'disabled':''}>${btnText}</button></div>`;
  }).join('');

  // Bind click
  $('shopGrid').querySelectorAll('.shop-btn').forEach(btn=>{
    if(btn.disabled)return;
    btn.addEventListener('click',()=>{
      const id=btn.dataset.id;
      const it=SHOP_ITEMS.find(i=>i.id===id);
      if(!it)return;
      const coins=loadMetaCoins();
      if(coins<it.cost)return;
      const purchases=loadPurchases();
      purchases.push(id);
      savePurchases(purchases);
      saveMetaCoins(coins-it.cost);
      sfxBuy();
      achStats.hasPurchased=true;
      checkAchievements(achStats);
      if(it.type==='skin')localStorage.setItem('snake_skin',id);
      renderShop();
      updateMenuStats();
    });
  });
}

// ============================================================
//  ACHIEVEMENTS SCREEN
// ============================================================
function renderAchScreen(){
  const ach=loadAchievements();
  const unlocked=Object.keys(ach).length;
  $('achUnlocked').textContent=unlocked;
  $('achGrid').innerHTML=ACHIEVEMENTS.map(a=>{
    const u=!!ach[a.id];
    return`<div class="ach-item ${u?'':'locked'}"><div class="ach-icon">${a.icon}</div><div class="ach-info"><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>${u?'<div class="ach-check">✓</div>':''}</div>`;
  }).join('');
}

// ============================================================
//  SCREEN SWITCHING
// ============================================================
function showScreen(id){
  ['menuScreen','gameScreen','shopScreen','achScreen'].forEach(s=>$(s).classList.remove('active'));
  $(id).classList.add('active');
  if(id==='shopScreen')renderShop();
  if(id==='achScreen')renderAchScreen();
  if(id==='menuScreen')updateMenuStats();
}

function updateMenuStats(){
  $('menuMetaCoins').textContent=loadMetaCoins();
  $('menuBestScore').textContent=loadHighScore();
  $('menuAchCount').textContent=Object.keys(loadAchievements()).length+'/14';
}

// ============================================================
//  INPUT
// ============================================================
const KEY_MAP={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',KeyW:'up',KeyS:'down',KeyA:'left',KeyD:'right'};

document.addEventListener('keydown',e=>{
  initAudio();
  const code=e.code;
  if(checkKonami(code)){toggleInvincible();e.preventDefault();return}
  if(code in KEY_MAP){e.preventDefault();if(gameOver||paused)return;changeDirection(KEY_MAP[code]);return}
  if(code==='Space'){e.preventDefault();togglePause();return}
});

// Restore nickname
try{const s=localStorage.getItem('snake_nickname');if(s)$('playerName').value=s}catch(e){}
$('playerName').addEventListener('input',()=>{try{localStorage.setItem('snake_nickname',$('playerName').value.trim())}catch(e){}});

// Menu buttons
$('btnPlay').addEventListener('click',()=>{initAudio();showScreen('gameScreen');initGame();draw()});
$('btnShop').addEventListener('click',()=>showScreen('shopScreen'));
$('btnAchievements').addEventListener('click',()=>showScreen('achScreen'));
$('btnLBFromMenu').addEventListener('click',()=>{initAudio();openLeaderboard()});
$('btnShopBack').addEventListener('click',()=>showScreen('menuScreen'));
$('btnAchBack').addEventListener('click',()=>showScreen('menuScreen'));

// Game buttons
$('btnResume').addEventListener('click',()=>{initAudio();togglePause()});
$('btnRestart').addEventListener('click',()=>{initAudio();showScreen('gameScreen');initGame();draw()});
$('btnToMenu').addEventListener('click',()=>{showScreen('menuScreen');updateMenuStats()});

// LB
$('lbClose').addEventListener('click',closeLeaderboard);
$('lbRefresh').addEventListener('click',async()=>{$('lbLoading').style.display='block';$('lbLoading').textContent='加载中...';$('lbTable').style.display='none';const d=await fetchLeaderboard();renderLeaderboard(d)});
$('lbModal').addEventListener('click',e=>{if(e.target===$('lbModal'))closeLeaderboard()});

// Mobile D-pad
function setupDpad(id,dir){const el=$(id);if(!el)return;el.addEventListener('pointerdown',e=>{e.preventDefault();initAudio();if(gameOver||paused)return;changeDirection(dir)})}
setupDpad('dpadUp','up');setupDpad('dpadDown','down');setupDpad('dpadLeft','left');setupDpad('dpadRight','right');
const dp=$('dpadPause');if(dp)dp.addEventListener('pointerdown',e=>{e.preventDefault();initAudio();togglePause()});

// Touch swipe
let tsx=0,tsy=0;
const gc=$('gameCanvas');
gc.addEventListener('touchstart',e=>{initAudio();tsx=e.touches[0].clientX;tsy=e.touches[0].clientY},{passive:true});
gc.addEventListener('touchend',e=>{if(gameOver||paused)return;const dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;if(Math.abs(dx)<20&&Math.abs(dy)<20)return;if(Math.abs(dx)>Math.abs(dy))changeDirection(dx>0?'right':'left');else changeDirection(dy>0?'down':'up')});

// ============================================================
//  START
// ============================================================
updateMenuStats();
</script>
