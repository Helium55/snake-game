<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 贪吃蛇 — Roguelike</title>
<style>
  :root{--bg:#0a0a0f;--surface:rgba(20,20,40,0.88);--text:#e0e0f0;--accent:#00ff88;--gold:#ffd740;--danger:#ff4060;--purple:#bd00ff}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);background-size:20px 20px;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI','PingFang SC',system-ui,sans-serif;color:var(--text);overflow-y:auto;padding:10px;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent}
  .game-wrapper{display:flex;flex-direction:column;align-items:center;gap:10px;max-width:440px;width:100%}

  .header{display:flex;justify-content:space-between;align-items:center;width:100%;padding:10px 16px;background:var(--surface);backdrop-filter:blur(12px);border-radius:16px;border:1px solid rgba(255,255,255,0.08)}
  .score-panel{display:flex;flex-direction:column}
  .score-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.4)}
  .score-value{font-size:26px;font-weight:700;color:var(--accent);text-shadow:0 0 20px rgba(0,255,136,0.5)}
  .high-score-panel{display:flex;flex-direction:column;align-items:flex-end}
  .high-score-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.4)}
  .high-score-value{font-size:18px;font-weight:600;color:var(--gold);text-shadow:0 0 12px rgba(255,215,64,0.3)}
  .level-badge{font-size:11px;font-weight:700;color:var(--purple);padding:4px 10px;background:rgba(189,0,255,0.12);border-radius:20px;border:1px solid rgba(189,0,255,0.2)}
  .next-upgrade{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;text-align:center}

  .name-row{display:flex;align-items:center;gap:8px;width:100%}
  .name-input{flex:1;padding:8px 14px;font-size:14px;background:var(--surface);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text);outline:none}
  .name-input:focus{border-color:var(--accent)}
  .name-input::placeholder{color:rgba(255,255,255,0.2)}
  .btn-lb{padding:8px 16px;font-size:12px;font-weight:700;letter-spacing:1px;border:1px solid rgba(255,215,64,0.3);border-radius:12px;background:rgba(255,215,64,0.08);color:var(--gold);cursor:pointer;white-space:nowrap;transition:all 0.2s}
  .btn-lb:hover{background:rgba(255,215,64,0.16);border-color:var(--gold)}
  .btn-back{padding:6px 14px;font-size:12px;font-weight:600;border:1px solid rgba(255,255,255,0.1);border-radius:10px;background:var(--surface);color:rgba(255,255,255,0.5);cursor:pointer;transition:all 0.2s}

  .canvas-container{position:relative;border-radius:16px;overflow:hidden;border:2px solid rgba(255,255,255,0.1);box-shadow:0 0 40px rgba(0,255,136,0.08),0 0 80px rgba(0,0,0,0.5);transition:border-color 0.5s,box-shadow 0.5s}
  .canvas-container.invincible{border-color:rgba(255,215,64,0.6);box-shadow:0 0 40px rgba(255,215,64,0.2),0 0 80px rgba(255,180,0,0.15);animation:inv-pulse 1.5s ease-in-out infinite}
  @keyframes inv-pulse{0%,100%{box-shadow:0 0 40px rgba(255,215,64,0.2),0 0 80px rgba(255,180,0,0.15)}50%{box-shadow:0 0 60px rgba(255,215,64,0.4),0 0 120px rgba(255,180,0,0.3)}}
  canvas{display:block;background:#080812}

  .inv-badge{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:12px;font-weight:700;letter-spacing:2px;color:#ffd740;text-shadow:0 0 16px rgba(255,215,64,0.8);padding:4px 14px;background:rgba(0,0,0,0.6);border-radius:20px;border:1px solid rgba(255,215,64,0.4);animation:badge-glow 1s ease-in-out infinite;z-index:5;pointer-events:none}
  .inv-badge.active{display:block}
  @keyframes badge-glow{0%,100%{box-shadow:0 0 10px rgba(255,215,64,0.3)}50%{box-shadow:0 0 20px rgba(255,215,64,0.6)}}

  /* Overlays */
  .overlay{display:none;position:absolute;inset:0;background:rgba(8,8,18,0.85);backdrop-filter:blur(4px);justify-content:center;align-items:center;flex-direction:column;gap:12px;z-index:10}
  .overlay.active{display:flex}
  .overlay-title{font-size:30px;font-weight:800;letter-spacing:4px}
  .overlay-title.pause{color:#ccccee}
  .overlay-title.over{color:var(--danger);text-shadow:0 0 30px rgba(255,64,96,0.5)}
  .overlay-subtitle{font-size:14px;color:rgba(255,255,255,0.5)}
  .overlay-score{font-size:44px;font-weight:800;color:var(--accent);text-shadow:0 0 30px rgba(0,255,136,0.5)}
  .new-record{font-size:14px;font-weight:700;color:var(--gold);text-shadow:0 0 16px rgba(255,215,64,0.6);animation:badge-glow 1s ease-in-out infinite}
  .btn{padding:10px 28px;font-size:14px;font-weight:700;letter-spacing:1px;border:none;border-radius:30px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;color:#0a0a0f}
  .btn-restart{background:var(--accent);box-shadow:0 0 20px rgba(0,255,136,0.3)}
  .btn-restart:hover{box-shadow:0 0 30px rgba(0,255,136,0.5);transform:scale(1.04)}
  .btn-menu{background:var(--purple);box-shadow:0 0 16px rgba(189,0,255,0.2)}
  .btn-menu:hover{box-shadow:0 0 24px rgba(189,0,255,0.4);transform:scale(1.04)}
  .btn-resume{background:#ccccee;box-shadow:0 0 16px rgba(200,200,240,0.2)}
  .btn-resume:hover{box-shadow:0 0 24px rgba(200,200,240,0.4);transform:scale(1.04)}
  .submit-status{font-size:12px;color:rgba(255,255,255,0.4);min-height:18px;text-align:center}
  .submit-status.success{color:var(--accent)}
  .submit-status.error{color:var(--danger)}

  /* === UPGRADE OVERLAY === */
  .upgrade-overlay{display:none;position:absolute;inset:0;z-index:20;background:radial-gradient(ellipse at center,rgba(20,10,50,0.7) 0%,rgba(0,0,0,0.95) 100%);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
  .upgrade-overlay.active{display:flex}
  #upgradeParticles{position:absolute;inset:0;pointer-events:none;z-index:21}
  .upgrade-content{position:relative;z-index:22;display:flex;flex-direction:column;align-items:center;gap:18px;padding:10px;width:100%}
  .upgrade-title{font-size:26px;font-weight:900;letter-spacing:3px;color:#fff;text-shadow:0 0 30px rgba(167,139,250,0.8),0 0 60px rgba(189,0,255,0.4);animation:title-glow 1.5s ease-in-out infinite}
  @keyframes title-glow{0%,100%{text-shadow:0 0 30px rgba(167,139,250,0.8)}50%{text-shadow:0 0 50px rgba(189,0,255,1),0 0 80px rgba(167,139,250,0.6)}}
  .upgrade-section-label{font-size:11px;text-transform:uppercase;letter-spacing:3px;color:rgba(255,255,255,0.3)}
  .upgrade-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .upgrade-card{width:150px;padding:18px 14px;border-radius:16px;text-align:center;cursor:pointer;transition:all 0.3s;position:relative;overflow:hidden}
  .upgrade-card::before{content:'';position:absolute;inset:0;border-radius:16px;opacity:0;transition:opacity 0.3s}
  .upgrade-card:hover{transform:translateY(-4px)}
  .upgrade-card.free{background:rgba(0,255,136,0.08);border:1.5px solid rgba(0,255,136,0.3)}
  .upgrade-card.free:hover{background:rgba(0,255,136,0.15);border-color:rgba(0,255,136,0.6);box-shadow:0 0 30px rgba(0,255,136,0.3),0 0 60px rgba(0,255,136,0.1)}
  .upgrade-card.shop{background:rgba(189,0,255,0.08);border:1.5px solid rgba(189,0,255,0.3)}
  .upgrade-card.shop:hover{background:rgba(189,0,255,0.15);border-color:rgba(189,0,255,0.6);box-shadow:0 0 30px rgba(189,0,255,0.3),0 0 60px rgba(189,0,255,0.1)}
  .upgrade-card.first{background:rgba(255,215,64,0.08);border:1.5px solid rgba(255,215,64,0.4);animation:first-card-pulse 2s ease-in-out infinite}
  @keyframes first-card-pulse{0%,100%{box-shadow:0 0 20px rgba(255,215,64,0.2)}50%{box-shadow:0 0 40px rgba(255,215,64,0.5)}}
  .upgrade-card.first:hover{background:rgba(255,215,64,0.18);border-color:rgba(255,215,64,0.8);box-shadow:0 0 50px rgba(255,215,64,0.5),0 0 80px rgba(255,215,64,0.2)}
  .upgrade-icon{font-size:36px;margin-bottom:6px;position:relative;z-index:1}
  .upgrade-name{font-size:14px;font-weight:700;color:#fff;position:relative;z-index:1}
  .upgrade-desc{font-size:10px;color:rgba(255,255,255,0.5);margin-top:4px;line-height:1.4;position:relative;z-index:1}
  .upgrade-cost{font-size:11px;font-weight:700;margin-top:6px;position:relative;z-index:1}
  .upgrade-cost.free-cost{color:var(--accent)}
  .upgrade-cost.seg-cost{color:var(--purple)}
  .upgrade-card.unaffordable{opacity:0.35;pointer-events:none}

  /* Toast */
  .toast-container{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none;width:90%;max-width:380px}
  .achievement-toast{background:rgba(20,18,40,0.95);backdrop-filter:blur(12px);border:1px solid rgba(255,215,64,0.4);border-radius:14px;padding:12px 16px;box-shadow:0 0 24px rgba(255,215,64,0.15);animation:toast-in 0.4s ease-out,toast-out 0.4s 2.6s ease-in forwards;display:flex;align-items:center;gap:10px}
  @keyframes toast-in{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateY(-20px)}}
  .toast-icon{font-size:28px}.toast-info{flex:1}
  .toast-name{font-size:14px;font-weight:700;color:var(--gold)}
  .toast-desc{font-size:11px;color:rgba(255,255,255,0.55);margin-top:2px}

  /* LB Modal */
  .lb-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);z-index:100;justify-content:center;align-items:center;padding:16px}
  .lb-modal.active{display:flex}
  .lb-panel{width:100%;max-width:420px;max-height:80vh;background:#111122;border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:24px 20px 16px;display:flex;flex-direction:column;box-shadow:0 0 60px rgba(0,0,0,0.6)}
  .lb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0}
  .lb-title{font-size:20px;font-weight:800;letter-spacing:2px;color:var(--gold);text-shadow:0 0 16px rgba(255,215,64,0.3)}
  .lb-close{width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .lb-close:hover{background:rgba(255,255,255,0.12)}
  .lb-table-wrap{flex:1;overflow-y:auto;border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
  .lb-table{width:100%;border-collapse:collapse;font-size:13px}
  .lb-table thead{position:sticky;top:0;z-index:2}
  .lb-table th{background:#1a1a30;padding:10px 6px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,0.4);border-bottom:1px solid rgba(255,255,255,0.08)}
  .lb-table td{padding:9px 6px;border-bottom:1px solid rgba(255,255,255,0.04);text-align:center}
  .lb-table tbody tr:hover{background:rgba(255,255,255,0.03)}
  .lb-table tbody tr.me{background:rgba(0,255,136,0.06)}
  .lb-rank{font-weight:700;color:rgba(255,255,255,0.5)}
  .lb-rank.top1{color:#ffd740;text-shadow:0 0 10px rgba(255,215,64,0.5)}
  .lb-rank.top2{color:#c0c0c0}.lb-rank.top3{color:#cd7f32}
  .lb-name{text-align:left;color:var(--text);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lb-score{font-weight:600;color:var(--accent)}
  .lb-level{font-size:11px;color:rgba(255,255,255,0.4)}
  .lb-time{font-size:10px;color:rgba(255,255,255,0.2)}
  .lb-loading{text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:14px}
  .lb-refresh{margin-top:12px;padding:8px;font-size:13px;text-align:center;color:rgba(255,255,255,0.4);cursor:pointer;border-radius:8px;flex-shrink:0}
  .lb-refresh:hover{color:var(--text)}

  /* Shop screen (body segment shop, permanent) */
  .screen{display:none;flex-direction:column;align-items:center;width:100%}
  .screen.active{display:flex}
  .menu-title{font-size:42px;font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,#00ff88,#bd00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
  .menu-subtitle{font-size:13px;color:rgba(255,255,255,0.35);letter-spacing:4px;margin-bottom:28px}
  .menu-btn{width:100%;max-width:300px;padding:14px;margin:6px 0;font-size:16px;font-weight:700;letter-spacing:2px;border:1px solid rgba(255,255,255,0.12);border-radius:14px;cursor:pointer;transition:all 0.2s;text-align:center;background:var(--surface);color:var(--text)}
  .menu-btn:hover{background:rgba(0,255,136,0.08);border-color:var(--accent)}
  .menu-btn.primary{background:rgba(0,255,136,0.12);border-color:rgba(0,255,136,0.3);color:var(--accent)}
  .menu-btn.primary:hover{background:rgba(0,255,136,0.2);box-shadow:0 0 24px rgba(0,255,136,0.15)}
  .menu-stats{display:flex;gap:20px;margin:16px 0;font-size:13px;color:rgba(255,255,255,0.4)}
  .menu-stats span{color:var(--gold)}

  /* Mobile */
  .mobile-controls{display:none;width:100%;max-width:280px}
  @media(max-width:600px),(hover:none)and(pointer:coarse){.mobile-controls{display:block}}
  .dpad{display:grid;grid-template-areas:". up ." "left . right" ". down .";grid-template-columns:1fr 1fr 1fr;gap:6px}
  .dpad-btn{aspect-ratio:1;border:1px solid rgba(255,255,255,0.12);border-radius:14px;background:var(--surface);backdrop-filter:blur(8px);color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .dpad-btn:active{background:rgba(0,255,136,0.15);border-color:var(--accent);box-shadow:0 0 16px rgba(0,255,136,0.2)}
  .dpad-up{grid-area:up}.dpad-left{grid-area:left}.dpad-right{grid-area:right}.dpad-down{grid-area:down}
  .pause-btn-mobile{width:100%;margin-top:10px;padding:10px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:var(--surface);color:var(--text);font-size:14px;font-weight:600;letter-spacing:2px;cursor:pointer;text-align:center}
  .key-hint{font-size:11px;color:rgba(255,255,255,0.2);letter-spacing:1px;text-align:center}
  @media(max-width:600px){.key-hint{display:none}.canvas-container{border-radius:12px}canvas{width:100%;height:auto}}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- MAIN MENU -->
<div class="screen active" id="menuScreen">
  <div class="game-wrapper">
    <h1 class="menu-title">🐍 贪吃蛇</h1>
    <div class="menu-subtitle">R O G U E L I K E</div>
    <div class="menu-stats">
      <span>🏆 <b id="menuBestScore">0</b></span>
      <span>🎖 <b id="menuAchCount">0/11</b></span>
    </div>
    <button class="menu-btn primary" id="btnPlay">▶ 开始游戏</button>
    <button class="menu-btn" id="btnAchievements">🏆 成就</button>
    <button class="menu-btn" id="btnLBFromMenu">📊 排行榜</button>
    <div class="name-row" style="margin-top:8px">
      <input class="name-input" id="playerName" placeholder="输入昵称" maxlength="12" autocomplete="off">
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="gameScreen">
  <div class="game-wrapper">
    <div class="header">
      <div class="score-panel">
        <span class="score-label">得分</span>
        <span class="score-value" id="score">0</span>
      </div>
      <div style="text-align:center">
        <div class="level-badge" id="levelBadge">Lv.1</div>
        <div class="next-upgrade" id="nextUpgrade">下次升级: 5🍎</div>
      </div>
      <div class="high-score-panel">
        <span class="high-score-label">最高分</span>
        <span class="high-score-value" id="highScore">0</span>
      </div>
    </div>

    <div class="canvas-container" id="canvasContainer">
      <canvas id="gameCanvas" width="500" height="500"></canvas>
      <div class="inv-badge" id="invBadge">⭐ 无敌模式</div>

      <!-- Auto shop button (visible only in auto mode) -->
      <button id="autoShopBtn" style="display:none;position:absolute;top:8px;right:8px;z-index:8;padding:5px 10px;font-size:11px;font-weight:700;border-radius:10px;border:1px solid rgba(189,0,255,0.4);background:rgba(189,0,255,0.15);color:#bd00ff;cursor:pointer;letter-spacing:1px">🛒 商店</button>

      <div class="overlay" id="pauseOverlay">
        <div class="overlay-title pause">暂 停</div>
        <div class="overlay-subtitle">按 空格键 继续</div>
        <button class="btn btn-resume" id="btnResume">继续</button>
        <button class="btn btn-restart" id="btnPauseUpload" style="margin-top:4px">📤 上传当前成绩</button>
        <div class="submit-status" id="pauseSubmitStatus"></div>
      </div>

      <div class="overlay" id="gameOverOverlay">
        <div class="overlay-title over">游戏结束</div>
        <div class="overlay-score" id="finalScore">0</div>
        <div class="new-record" id="newRecord" style="display:none">🎉 新纪录！</div>
        <div class="overlay-subtitle" id="finalHighScore"></div>
        <div class="submit-status" id="submitStatus"></div>
        <button class="btn btn-restart" id="btnRestart">再来一局</button>
        <button class="btn btn-menu" id="btnToMenu">返回主菜单</button>
      </div>

      <!-- UPGRADE OVERLAY with particles -->
      <div class="upgrade-overlay" id="upgradeOverlay">
        <canvas id="upgradeParticles"></canvas>
        <div class="upgrade-content" id="upgradeContent"></div>
      </div>

      <!-- Auto shop panel -->
      <div id="autoShopPanel" style="display:none;position:absolute;inset:0;z-index:18;background:rgba(0,0,0,0.92);backdrop-filter:blur(8px);flex-direction:column;overflow-y:auto;padding:16px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font-size:18px;font-weight:800;color:#bd00ff;text-shadow:0 0 16px rgba(189,0,255,0.4)">🛒 自动化商店</span>
          <button id="autoShopClose" style="width:32px;height:32px;border-radius:50%;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:var(--text);font-size:16px;cursor:pointer">✕</button>
        </div>
        <div style="font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:14px">💰 可用点数: <span id="autoShopBP" style="color:#ffd740;font-weight:700">0</span></div>
        <div id="autoShopItems"></div>
      </div>
    </div>

    <div class="mobile-controls">
      <div class="dpad">
        <button class="dpad-btn dpad-up" id="dpadUp">▲</button>
        <button class="dpad-btn dpad-left" id="dpadLeft">◀</button>
        <button class="dpad-btn dpad-right" id="dpadRight">▶</button>
        <button class="dpad-btn dpad-down" id="dpadDown">▼</button>
      </div>
      <div class="pause-btn-mobile" id="dpadPause">⏯ 暂停</div>
    </div>
    <div class="key-hint">↑↓←→ / WASD 移动 | 空格 暂停</div>
  </div>
</div>

<!-- ACHIEVEMENTS SCREEN -->
<div class="screen" id="achScreen">
  <div class="game-wrapper">
    <div style="display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:8px">
      <button class="btn-back" id="btnAchBack">← 返回</button>
      <span style="font-size:14px;color:rgba(255,255,255,0.4)"><span id="achUnlocked">0</span>/11</span>
    </div>
    <div class="ach-grid" id="achGrid" style="width:100%;display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto"></div>
  </div>
</div>

<!-- LEADERBOARD MODAL -->
<div class="lb-modal" id="lbModal">
  <div class="lb-panel">
    <div class="lb-header"><span class="lb-title">🏆 全服排行榜</span><button class="lb-close" id="lbClose">✕</button></div>
    <div class="lb-table-wrap">
      <div class="lb-loading" id="lbLoading">加载中...</div>

function totalBodyPoints(){
  let p=0;for(const s of snake)p+=Math.pow(mergeThreshold,(s.lvl||1)-1);return p;
}
// 2048-style: merge same-level groups from tail
function compressBody(){
  if(!bodyCompress||snake.length<mergeThreshold+1)return;
  let merged;
  do{
    merged=false;
    for(let lvl=1;lvl<=6;lvl++){
      let count=0;
      for(let i=snake.length-1;i>=1;i--){if((snake[i].lvl||1)===lvl)count++;else break}
      if(count>=mergeThreshold){
        let removed=0;
        for(let i=snake.length-1;i>=1&&removed<mergeThreshold;i--){
          if((snake[i].lvl||1)===lvl){snake.splice(i,1);removed++}
        }
        const last=snake[snake.length-1]||snake[0];
        snake.push({x:last.x,y:last.y,lvl:lvl+1});
        merged=true;break;
      }
    }
  }while(merged);
}

      autoMode=true;
      $('autoShopBtn').style.display='';
      for(let i=0;i<autoFoodSpawn;i++)spawnFood();
      paused=false;
      tickTimer=setTimeout(gameTick,BASE_SPEED*autoSpeedDivider);
      updateUI();draw();
      return;
    }

    // Apply shop cost from bodyPoints
    const shopCard=$('upgradeContent').querySelector(`.pick-shop[data-id="${pickedShop}"]`);
    let shopCost=0;
    if(pickedShop&&shopCard){shopCost=parseInt(shopCard.dataset.cost);shopPurchaseCount++}
    if(shopCost>0)deductBodyPoints(shopCost);

    applyUpgrade(pickedFree,isFirst);
    if(pickedShop)applyUpgrade(pickedShop,false);
    if(pickedFree==='bonus_food')foodEaten+=3;
    if(pickedFree==='body_surge'){for(let i=0;i<5;i++){const t=snake[snake.length-1];snake.push({x:t.x,y:t.y,lvl:1})}}
    if(pickedFree==='merge_boost')mergeThreshold=Math.max(2,mergeThreshold-1);
    if(pickedFree==='lucky'){window._luckyNext=true}
    if(pickedFree==='speedy'){invincible=true;setTimeout(()=>{invincible=false},5000)}
    if(pickedFree==='gold_rush'){specialChanceBonus+=0.3;scheduleSpecialFood()}
    bodyPoints=totalBodyPoints();

    // 1s pause before resuming
    $('upgradeOverlay').classList.remove('active');stopParticles();
    draw();updateUI();
    setTimeout(()=>{
      paused=false;
      tickTimer=setTimeout(gameTick,getSpeed());
      checkAchievements(achStats);
    },1000);
  });
}

function deductBodyPoints(cost){
  // Remove tail segments totaling 'cost' body points
  let toRemove=cost;
  while(toRemove>0&&snake.length>2){
    const tail=snake[snake.length-1];
    const val=Math.pow(mergeThreshold,(tail.lvl||1)-1);
    if(val<=toRemove){toRemove-=val;snake.pop()}
    else break; // can't split a segment, just stop
  }
  bodyPoints=Math.max(2,totalBodyPoints());
}

// Body compression: 4→1, recursive like 2048
function compressBody(){
  if(!bodyCompress||snake.length<4)return;
  let n=snake.length;
  while(n>=4){n=Math.floor(n/4)+(n%4)}
  while(snake.length>Math.max(3,n))snake.pop();
}

function applyUpgrade(id,isFirst){
  if(isFirst){
    if(id==='no_self_collide'){noSelfCollide=true;achStats.hasImmune=true}
    if(id==='body_compress'){bodyCompress=true;achStats.hasCompress=true;compressBody()}
    return;
  }
  const free=FREE_UPGRADES.find(c=>c.id===id);
  if(free){
    activeFree.push(free);
    if(id==='shield')shieldCount++;
    if(id==='grow1')growExtra++;
    if(id==='score_boost')scoreMult*=1.5;
    if(id==='special_chance'){specialChanceBonus+=0.1;scheduleSpecialFood()}
    if(id==='crit_eat')critChance+=0.15;
    if(id==='iron_stomach')growExtra+=2;
    return;
  }
  const shop=SHOP_UPGRADES.find(c=>c.id===id);
  if(shop){
    activeShop.push(shop);
    if(id==='shield')shieldCount++;
    if(id==='wrap')wrapMode=true;
    if(id==='dodge')dodgeChance+=0.2;
    if(id==='phase')phaseTimer=0;
    if(id==='split_food')splitChance+=0.1;
    if(id==='golden_touch')goldenTouch+=0.1;
    if(id==='ghost_tail')ghostTail+=2;
  }
}

let pCanvas,pCtx,particles=[],pRunning=false,pRAF=0;

function startParticles(){
  pCanvas=$('upgradeParticles');pCtx=pCanvas.getContext('2d');
  pCanvas.width=pCanvas.offsetWidth;pCanvas.height=pCanvas.offsetHeight;
  particles=[];pRunning=true;
  // spawn initial burst
  for(let i=0;i<80;i++)spawnParticle();
  loopParticles();
}
function stopParticles(){pRunning=false;cancelAnimationFrame(pRAF)}
function spawnParticle(){
  particles.push({
    x:pCanvas.width/2+(Math.random()-0.5)*200,y:pCanvas.height/2+(Math.random()-0.5)*200,
    vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:1,decay:0.005+Math.random()*0.015,
    size:1+Math.random()*3,hue:Math.random()<0.5?Math.random()*60+250:(Math.random()<0.5?40:280),
  });
}
function loopParticles(){
  if(!pRunning)return;
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  // spawn new
  if(particles.length<200&&Math.random()<0.5)spawnParticle();
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue}
    pCtx.globalAlpha=p.life;
    pCtx.fillStyle=`hsl(${p.hue},90%,${50+p.life*30}%)`;
    pCtx.shadowColor=pCtx.fillStyle;pCtx.shadowBlur=6;
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.size,0,Math.PI*2);pCtx.fill();
  }
  pCtx.globalAlpha=1;pCtx.shadowBlur=0;
  pRAF=requestAnimationFrame(loopParticles);
}

// ============================================================
// GAME TICK
// ============================================================
function gameTick(){
  if(paused||gameOver)return;
  inputLocked=false;

  // AI auto-movement (idle mode)
  if(autoMode){
    const h=snake[0];
    // Pick target: prefer special food if smart AI
    let target=specialFood;
    if(!target||!window._aiSmart)target=food;
    if(!target){target={x:Math.floor(GRID/2),y:Math.floor(GRID/2)}}
    // Greedy path: prefer axis with bigger gap
    const dx=target.x-h.x,dy=target.y-h.y;
    const dirs=[];
    if(Math.abs(dx)>=Math.abs(dy)){
      dirs.push(dx>0?'right':'left',dy>0?'down':'up');
    }else{
      dirs.push(dy>0?'down':'up',dx>0?'right':'left');
    }
    // Add all possible directions
    if(!dirs.includes('right'))dirs.push('right');
    if(!dirs.includes('left'))dirs.push('left');
    if(!dirs.includes('down'))dirs.push('down');
    if(!dirs.includes('up'))dirs.push('up');
    // Try each direction, pick first safe one
    for(const d of dirs){
      if(!isValidDirection(d))continue;
      const test={...h};
      switch(d){case'up':test.y--;break;case'down':test.y++;break;case'left':test.x--;break;case'right':test.x++}
      // Check would this kill us?
      const w=test.x<0||test.x>=GRID||test.y<0||test.y>=GRID;
      if(w&&!wrapMode)continue;
      const willEat=target&&test.x===target.x&&test.y===target.y;
      let hitBody=false;
      const clen=willEat?snake.length:snake.length-1;
      for(let i=0;i<clen;i++){if(snake[i].x===test.x&&snake[i].y===test.y){hitBody=true;break}}
      if(hitBody&&!noSelfCollide)continue;
      direction=d;break;
    }
  }

  if(isValidDirection(nextDirection))direction=nextDirection;

  const head={...snake[0]};
  switch(direction){case'up':head.y--;break;case'down':head.y++;break;case'left':head.x--;break;case'right':head.x++;break}

  // Wall
  const hitWall=head.x<0||head.x>=GRID||head.y<0||head.y>=GRID;

  // Phase ability
  if(activeShop.some(c=>c.id==='phase')){
    phaseTimer+=getSpeed();
    if(phaseTimer>=8000){phaseTimer=0;/* activate next tick through invincible-like behavior */ }
  }
  const isPhasing=activeShop.some(c=>c.id==='phase')&&phaseTimer<1000; // 1s phase window

  if(hitWall){
    if(invincible||isPhasing||wrapMode){head.x=(head.x+GRID)%GRID;head.y=(head.y+GRID)%GRID}
    else if(shieldCount>0){shieldCount--;head.x=(head.x+GRID)%GRID;head.y=(head.y+GRID)%GRID}
    else if(Math.random()<dodgeChance){head.x=(head.x+GRID)%GRID;head.y=(head.y+GRID)%GRID}
    else{endGame();return}
  }

  const willEatRegular=food&&head.x===food.x&&head.y===food.y;
  const willEatSpecial=specialFood&&head.x===specialFood.x&&head.y===specialFood.y;
  const growing=willEatRegular||willEatSpecial;

  // Self collision (ghost tail: last N segments are intangible)
  if(!noSelfCollide){
    const realLen=ghostTail>0?Math.max(1,snake.length-ghostTail):snake.length;
    const checkLen=growing?realLen:realLen-1;
    let hitSelf=false;
    for(let i=0;i<checkLen;i++){if(snake[i].x===head.x&&snake[i].y===head.y){hitSelf=true;break}}
    if(hitSelf){
      if(invincible||isPhasing){}else if(shieldCount>0){shieldCount--}else if(Math.random()<dodgeChance){}else{endGame();return}
    }
  }

  snake.unshift(head);

  // Periodic shield
  if(activeShop.some(c=>c.id==='periodic_shield')){
    if(!window._lastPeriodicShield)window._lastPeriodicShield=Date.now();
    if(Date.now()-window._lastPeriodicShield>15000){shieldCount++;window._lastPeriodicShield=Date.now()}
  }

  // Auto-collect: in auto mode, eat food within range
  if(autoMode&&autoCollectRange>1){
    const h=snake[0];
    if(food&&Math.abs(food.x-h.x)+Math.abs(food.y-h.y)<=autoCollectRange&&!(food.x===h.x&&food.y===h.y)){
      // Teleport food to head (simulate auto-collect)
      food.x=h.x;food.y=h.y;
    }
    if(specialFood&&Math.abs(specialFood.x-h.x)+Math.abs(specialFood.y-h.y)<=autoCollectRange&&!(specialFood.x===h.x&&specialFood.y===h.y)){
      specialFood.x=h.x;specialFood.y=h.y;
    }
  }

  if(willEatRegular){
    let pts=1*scoreMult;
    if(Math.random()<critChance)pts*=2;
    score+=pts;foodEaten++;
    const extraGrow=1+growExtra;
    for(let i=0;i<extraGrow-1;i++){const t=snake[snake.length-1];snake.push({x:t.x,y:t.y,lvl:1})}
    // Auto food bonus: extra body points
    if(autoMode&&autoFoodBonus>0){for(let i=0;i<autoFoodBonus;i++){const t=snake[snake.length-1];snake.push({x:t.x,y:t.y,lvl:1})}}
    sfxEat();spawnFood();
    if(Math.random()<goldenTouch&&!specialFood)spawnSpecialFood();
    if(Math.random()<splitChance)spawnFood();
    if(autoMode)for(let i=0;i<autoFoodSpawn-1;i++)spawnFood();
    if(autoMode&&Math.random()<autoSpecialRate&&!specialFood)spawnSpecialFood();
    if(specialFood&&food.x===specialFood.x&&food.y===specialFood.y)specialFood=null;
  }else if(willEatSpecial){
    const bonus=activeShop.some(c=>c.id==='double_special')?4:2;
    let pts=bonus*scoreMult;
    if(Math.random()<critChance)pts*=2;
    score+=pts;foodEaten++;achStats.totalSpecial++;
    const extraGrow=bonus+growExtra;
    for(let i=0;i<extraGrow;i++){const t=snake[snake.length-1];snake.push({x:t.x,y:t.y,lvl:1})}
    if(autoMode&&autoFoodBonus>0){for(let i=0;i<autoFoodBonus;i++){const t=snake[snake.length-1];snake.push({x:t.x,y:t.y,lvl:1})}}
    sfxSpecial();specialFood=null;
  }else{snake.pop()}

  if(specialFood&&Date.now()-specialFood.spawnTime>8000)specialFood=null;

  // Magnet
  if(activeShop.some(c=>c.id==='magnet')){
    const h=snake[0],d=3;
    const onSnake=(x,y)=>snake.some(s=>s.x===x&&s.y===y);
    const pull=(obj)=>{
      if(!obj)return;
      if(Math.abs(obj.x-h.x)+Math.abs(obj.y-h.y)<=d){
        const nx=obj.x<h.x?obj.x+1:obj.x>h.x?obj.x-1:obj.x;
        const ny=obj.y<h.y?obj.y+1:obj.y>h.y?obj.y-1:obj.y;
        if(nx>=0&&nx<GRID&&ny>=0&&ny<GRID&&!onSnake(nx,ny)){obj.x=nx;obj.y=ny}
      }
    };
    pull(food);pull(specialFood);
  }

  // Food radar highlight
  if(activeShop.some(c=>c.id==='food_radar')){
    if(food)drawCellGlow(food.x,food.y,'rgba(0,255,136,0.15)',20);
    if(specialFood)drawCellGlow(specialFood.x,specialFood.y,'rgba(255,215,64,0.15)',20);
  }

  if(bodyCompress)compressBody();
  bodyPoints=totalBodyPoints();
  if(ghostTail>0){/* ghost tail: last N segments don't collide, handled in self-collision check */}

  level=Math.floor(foodEaten/5)+1;
  updateUI();draw();

  // Check upgrade trigger (skip in auto mode)
  if(!autoMode&&foodEaten>=nextUpgradeAt){
    nextUpgradeAt=foodEaten+UPGRADE_EVERY;
    showUpgradeScreen();
    return;
  }

  if(!gameOver&&!paused){
    const spd=autoMode?BASE_SPEED*autoSpeedDivider:getSpeed();
    tickTimer=setTimeout(gameTick,spd);
  }
}

function endGame(){
  gameOver=true;sfxDie();
  if(tickTimer)clearTimeout(tickTimer);
  if(specialFoodTimer)clearInterval(specialFoodTimer);

  // Keep-score insurance
  if(activeShop.some(c=>c.id==='keep_score'))score=Math.floor(score/2);
  const finalScore=Math.floor(score);
  const isNewRecord=finalScore>highScore;
  if(isNewRecord){highScore=finalScore;saveHighScore(highScore)}

  achStats.totalFood+=foodEaten;
  achStats.maxLevel=Math.max(achStats.maxLevel,level);
  if(usedInvincibleThisRun)achStats.usedInvincible=true;
  checkAchievements(achStats);

  $('finalScore').textContent=finalScore;
  $('finalHighScore').textContent=`最高分: ${highScore}`;
  $('newRecord').style.display=isNewRecord?'block':'none';
  $('gameOverOverlay').classList.add('active');
  updateUI();draw();

  // Submit score
  if(finalScore>0&&!scoreSubmitted){
    scoreSubmitted=true;
    $('submitStatus').textContent='提交分数中...';$('submitStatus').className='submit-status';
    const name=$('playerName').value.trim()||'无名蛇';
    submitScore(name,finalScore,level).then(ok=>{
      if(ok){$('submitStatus').textContent='✅ 已上传排行榜';$('submitStatus').className='submit-status success'}
      else{$('submitStatus').textContent='⚠️ 上传失败';$('submitStatus').className='submit-status error'}
    });
  }
}

function isValidDirection(dir){const o={up:'down',down:'up',left:'right',right:'left'};return dir!==o[direction]}
function changeDirection(dir){if(inputLocked)return;if(!isValidDirection(dir))return;nextDirection=dir;inputLocked=true}

function draw(){
  const canvas=$('gameCanvas'),ctx=canvas.getContext('2d');ctx.clearRect(0,0,CW,CH);
  ctx.strokeStyle='rgba(255,255,255,0.02)';ctx.lineWidth=0.5;
  for(let i=0;i<=GRID;i++){const p=i*CELL;ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,CH);ctx.stroke();ctx.beginPath();ctx.moveTo(0,p);ctx.lineTo(CW,p);ctx.stroke()}
  if(food)drawCell(food.x,food.y,'#ff4060','rgba(255,64,96,0.7)',0.9);
  if(specialFood){const age=Date.now()-specialFood.spawnTime,pulse=0.7+0.3*Math.sin(age*0.01),alpha=age>6000?Math.max(0,1-(age-6000)/2000):1;drawCell(specialFood.x,specialFood.y,'#ffd740',`rgba(255,215,64,${pulse*alpha})`,pulse)}

  const len=snake.length;
  for(let i=len-1;i>=0;i--){
    const seg=snake[i],t=len===1?0:i/(len-1);
    let color,glow;
    if(invincible){const hue=42+Math.sin(Date.now()*0.005+i*0.4)*10;color=`hsl(${hue},90%,${60-t*20}%)`;glow=`hsla(${hue},90%,55%,0.6)`}
    else{const r=Math.round(0+t*138),g=Math.round(255-t*175),b=Math.round(136+t*119);color=`rgb(${r},${g},${b})`;glow=`rgba(${r},${g},${b},0.55)`}
    drawCell(seg.x,seg.y,color,glow,0.92);
    // Show compression level
    const lvl=seg.lvl||1;
    if(lvl>1&&i>0){
      const cx=seg.x*CELL+CELL/2,cy=seg.y*CELL+CELL/2;
      ctx.fillStyle='#fff';ctx.font='bold 9px "Segoe UI"';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=3;
      ctx.fillText(lvl,cx,cy);
      ctx.shadowColor='transparent';ctx.shadowBlur=0;
    }
  }

  // Eyes
  if(snake.length>0){const head=snake[0],hx=head.x*CELL,hy=head.y*CELL,er=2.5;ctx.fillStyle='#fff';let e1,e2;switch(direction){case'right':e1=[hx+13,hy+5];e2=[hx+13,hy+13];break;case'left':e1=[hx+5,hy+5];e2=[hx+5,hy+13];break;case'up':e1=[hx+5,hy+5];e2=[hx+13,hy+5];break;case'down':e1=[hx+5,hy+13];e2=[hx+13,hy+13];break}ctx.beginPath();ctx.arc(e1[0],e1[1],er,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e2[0],e2[1],er,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(e1[0],e1[1],1.3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(e2[0],e2[1],1.3,0,Math.PI*2);ctx.fill()}
}

function drawCell(gx,gy,fc,gc,fa){
  const canvas=$('gameCanvas'),ctx=canvas.getContext('2d'),x=gx*CELL,y=gy*CELL,pad=1.2;
  ctx.shadowColor=gc;ctx.shadowBlur=8;const r=3,rx=x+pad,ry=y+pad,rw=CELL-pad*2,rh=CELL-pad*2;
  ctx.fillStyle=fc;ctx.globalAlpha=fa;
  ctx.beginPath();ctx.moveTo(rx+r,ry);ctx.lineTo(rx+rw-r,ry);ctx.quadraticCurveTo(rx+rw,ry,rx+rw,ry+r);ctx.lineTo(rx+rw,ry+rh-r);ctx.quadraticCurveTo(rx+rw,ry+rh,rx+rw-r,ry+rh);ctx.lineTo(rx+r,ry+rh);ctx.quadraticCurveTo(rx,ry+rh,rx,ry+rh-r);ctx.lineTo(rx,ry+r);ctx.quadraticCurveTo(rx,ry,rx+r,ry);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.arc(rx+rw*0.3,ry+rh*0.35,rw*0.22,0,Math.PI*2);ctx.fill();
  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.globalAlpha=1;
}

function drawCellGlow(gx,gy,gc,blur){
  const canvas=$('gameCanvas'),ctx=canvas.getContext('2d'),x=gx*CELL,y=gy*CELL;
  ctx.shadowColor=gc;ctx.shadowBlur=blur;
  ctx.fillStyle='transparent';
  ctx.beginPath();ctx.arc(x+CELL/2,y+CELL/2,CELL/2,0,Math.PI*2);ctx.fill();
  ctx.shadowColor='transparent';ctx.shadowBlur=0;
}

    const nameDisplay=isDevil?'<span style="color:#ff4060;text-shadow:0 0 8px rgba(255,64,96,0.5)">👑 魔王helium</span>':escapeHtml(e.player_name);
    const extraRow=isDevil?'<tr><td colspan="5" style="font-size:9px;color:rgba(255,255,255,0.2);padding:2px;border:none;text-align:right;font-style:italic">—— "看名字就知道很稀有"</td></tr>':'';
    return`<tr class="${isMe?'me':''} ${isDevil?'devil':''}" ${isDevil?'style="background:rgba(255,64,96,0.04)"':''}"><td class="lb-rank ${rc}">${isDevil?'👑':r}</td><td class="lb-name" style="${isDevil?'color:#ff4060':''}">${nameDisplay}</td><td class="lb-score" style="${isDevil?'color:#ff4060;text-shadow:0 0 8px rgba(255,64,96,0.3)':''}">${e.score}</td><td class="lb-level">Lv.${e.level||1}</td><td class="lb-time">${time}</td></tr>${extraRow}`;
  }).join('');

  // Check if player beat the devil
  const playerBest=best.get(curName);
  if(playerBest&&playerBest.score>999&&!achStats.beatDevil){
    achStats.beatDevil=true;
    checkAchievements(achStats);
  }
}

      <div class="ach-icon" style="font-size:24px;flex-shrink:0">${u?a.icon:'❓'}</div>

}

// Auto shop
$('autoShopBtn').addEventListener('click',()=>{renderAutoShop();$('autoShopPanel').style.display='flex'});
$('autoShopClose').addEventListener('click',()=>{$('autoShopPanel').style.display='none'});
function renderAutoShop(){
  const bp=totalBodyPoints();
  $('autoShopBP').textContent=bp;
  const cats={auto:'⚡ 自动化',food:'🍎 食物',env:'🌃 环境'};
  const catOrder=['auto','food','env'];
  let html='';
  for(const cat of catOrder){
    html+=`<div style="font-size:11px;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.3);margin:12px 0 6px">${cats[cat]}</div>`;
    for(const it of AUTO_SHOP.filter(i=>i.cat===cat)){
      const owned=(autoShopPurchases[it.id]||0);
      const cost=Math.ceil(it.baseCost*(1+owned*0.3));
      const afford=bp>cost+1;
      html+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin:3px 0;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05)">
        <div style="flex:1;min-width:0"><span style="font-size:13px">${it.icon} ${it.name}</span><span style="font-size:10px;color:rgba(255,255,255,0.35);margin-left:6px">${it.desc}</span></div>
        <button class="auto-buy-btn" data-id="${it.id}" data-cost="${cost}" style="margin-left:8px;padding:4px 12px;font-size:11px;font-weight:700;border-radius:8px;border:1px solid ${afford?'rgba(189,0,255,0.4)':'rgba(255,255,255,0.1)'};background:${afford?'rgba(189,0,255,0.1)':'rgba(255,255,255,0.03)'};color:${afford?'#bd00ff':'rgba(255,255,255,0.2)'};cursor:${afford?'pointer':'default'};white-space:nowrap" ${afford?'':'disabled'}>💰${cost}</button>
      </div>`;
    }
  }
  $('autoShopItems').innerHTML=html;
  $('autoShopItems').querySelectorAll('.auto-buy-btn:not([disabled])').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.id,cost=parseInt(btn.dataset.cost);
      const bp=totalBodyPoints();
      if(bp<=cost+1)return;
      deductBodyPoints(cost);
      autoShopPurchases[id]=(autoShopPurchases[id]||0)+1;
      saveAutoShop();
      const it=AUTO_SHOP.find(i=>i.id===id);
      if(it)it.apply();
      if(bodyCompress)compressBody();
      bodyPoints=totalBodyPoints();
      updateUI();draw();
      renderAutoShop();
    });
  });
}
loadAutoShop();
// Re-apply safe effects on load (skip anything that needs game state)
for(const[id,count]of Object.entries(autoShopPurchases)){
  const it=AUTO_SHOP.find(i=>i.id===id);
  if(!it)continue;
  for(let i=0;i<count;i++){
    try{
      if(it.cat==='env'||id==='auto_speed'||(it.cat==='auto'&&id!=='auto_food_spawn'))it.apply();
    }catch(e){/* skip effects that need game state */}
  }
}

function setupDpad(id,dir){const el=$(id);if(!el)return;el.addEventListener('pointerdown',e=>{e.preventDefault();initAudio();if(gameOver||paused||autoMode)return;changeDirection(dir)})}
setupDpad('dpadUp','up');setupDpad('dpadDown','down');setupDpad('dpadLeft','left');setupDpad('dpadRight','right');
const dp=$('dpadPause');if(dp)dp.addEventListener('pointerdown',e=>{e.preventDefault();initAudio();togglePause()});
let tsx=0,tsy=0;const gc=$('gameCanvas');
gc.addEventListener('touchstart',e=>{initAudio();tsx=e.touches[0].clientX;tsy=e.touches[0].clientY},{passive:true});
gc.addEventListener('touchend',e=>{if(gameOver||paused||autoMode)return;const dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;if(Math.abs(dx)<20&&Math.abs(dy)<20)return;if(Math.abs(dx)>Math.abs(dy))changeDirection(dx>0?'right':'left');else changeDirection(dy>0?'down':'up')});

new ResizeObserver(()=>{if(pRunning){pCanvas=$('upgradeParticles');pCtx=pCanvas.getContext('2d');pCanvas.width=pCanvas.offsetWidth;pCanvas.height=pCanvas.offsetHeight}}).observe($('upgradeOverlay'));

// Start
showScreen('menuScreen');
